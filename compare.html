<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glass Button Comparison</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f0f0f0;
            padding: 40px 20px;
        }

        .comparison-container {
            display: flex;
            gap: 40px;
            justify-content: center;
            align-items: flex-start;
            max-width: 1200px;
            margin: 0 auto;
            flex-wrap: wrap;
        }

        .comparison-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .label {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }

        .reference-image {
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
        }

        .reference-image img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .button-preview {
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
        }

        /* Glass Button Styles */
        .glass-button {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(240, 238, 248, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1.5px solid rgba(255, 255, 255, 0.5);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow:
                0 20px 50px rgba(150, 120, 180, 0.3),
                inset 0 1px 1px rgba(255, 255, 255, 0.8),
                inset 0 -1px 2px rgba(0, 0, 0, 0.05);
            position: relative;
            overflow: hidden;
        }

        .glass-button:hover {
            background: rgba(245, 240, 255, 0.28);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow:
                0 15px 45px rgba(180, 140, 200, 0.25),
                inset 0 1px 1px rgba(255, 255, 255, 0.7),
                inset 0 -1px 2px rgba(0, 0, 0, 0.06);
            transform: translateY(-3px);
        }

        .glass-button:active {
            background: rgba(235, 225, 245, 0.15);
            border-color: rgba(255, 255, 255, 0.25);
            box-shadow:
                0 5px 15px rgba(180, 140, 200, 0.15),
                inset 0 1px 1px rgba(255, 255, 255, 0.5),
                inset 0 -1px 2px rgba(0, 0, 0, 0.04);
            transform: translateY(-1px);
        }

        .icon {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        svg {
            width: 100%;
            height: 100%;
            color: rgba(155, 145, 170, 0.6);
            transition: color 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-button:hover svg {
            color: rgba(120, 100, 145, 0.8);
        }

        .glass-button:active svg {
            color: rgba(100, 80, 125, 0.75);
        }

        .state-label {
            font-size: 12px;
            color: #666;
            margin-top: 8px;
            font-weight: 500;
        }
    </style>
</head>
