<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glass Button Comparison</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f0f0f0;
            padding: 40px 20px;
        }

        .comparison-container {
            display: flex;
            gap: 40px;
            justify-content: center;
            align-items: flex-start;
            max-width: 1200px;
            margin: 0 auto;
            flex-wrap: wrap;
        }

        .comparison-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .label {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }

        .reference-image {
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
        }

        .reference-image img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .button-preview {
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
        }

        /* Glass Button Styles */
        .glass-button {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(245, 243, 250, 0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 0.5px solid rgba(255, 255, 255, 0.25);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow:
                0 40px 80px rgba(140, 110, 170, 0.12),
                inset 0 1px 2px rgba(255, 255, 255, 0.3),
                inset 0 -1px 2px rgba(0, 0, 0, 0.01);
            position: relative;
            overflow: hidden;
        }

        .glass-button:hover {
            background: rgba(245, 240, 255, 0.35);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow:
                0 35px 70px rgba(180, 140, 200, 0.18),
                inset 0 1px 1px rgba(255, 255, 255, 0.5),
                inset 0 -1px 2px rgba(0, 0, 0, 0.03);
            transform: translateY(-2px);
        }

        .glass-button:active {
            background: rgba(235, 225, 245, 0.2);
            border-color: rgba(255, 255, 255, 0.25);
            box-shadow:
                0 15px 30px rgba(180, 140, 200, 0.1),
                inset 0 1px 1px rgba(255, 255, 255, 0.3),
                inset 0 -1px 2px rgba(0, 0, 0, 0.02);
            transform: translateY(0);
        }

        .icon {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        svg {
            width: 100%;
            height: 100%;
            color: rgba(165, 150, 185, 0.45);
            transition: color 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-button:hover svg {
            color: rgba(145, 125, 170, 0.55);
        }

        .glass-button:active svg {
            color: rgba(135, 115, 160, 0.5);
        }

        .state-label {
            font-size: 12px;
            color: #666;
            margin-top: 8px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="comparison-container">
        <div class="comparison-item">
            <div class="label">Reference Design</div>
            <div class="reference-image">
                <img src="reference.png" alt="Reference" />
            </div>
            <div class="state-label">Reference (default state)</div>
        </div>

        <div class="comparison-item">
            <div class="label">Current Implementation</div>
            <div class="button-preview">
                <button class="glass-button">
                    <div class="icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="5" y1="19" x2="19" y2="5"></line>
                            <polyline points="19 5 12 5 19 12"></polyline>
                        </svg>
                    </div>
                </button>
            </div>
            <div class="state-label">Current (default state)</div>
        </div>
    </div>
</body>
</html>
