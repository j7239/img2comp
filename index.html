<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UI Iteration — Reference vs Implementation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f0f0f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .comparison-container {
            display: flex;
            gap: 40px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
        }

        .comparison-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .label {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }

        /* Both panels size to reference.png's natural dimensions so 1px in
           the browser equals 1px in the screenshot pipeline. --ref-w / --ref-h
           are set by the inline script below once reference.png loads. */
        .reference-image,
        .button-preview {
            width: var(--ref-w, 400px);
            height: var(--ref-h, 400px);
        }

        .reference-image {
            background: #fff;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
        }

        .reference-image img {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* iterate.js also force-sizes .button-preview to reference dims
           before each screenshot — the inline script handles the browser view. */
        .button-preview {
            position: relative;
            background: #f0f0f0;
            overflow: hidden;
        }

        .state-label {
            font-size: 12px;
            color: #666;
            margin-top: 8px;
            font-weight: 500;
        }
    </style>
    <script>
        (function () {
            const img = new Image();
            img.onload = function () {
                const s = document.documentElement.style;
                s.setProperty('--ref-w', img.naturalWidth + 'px');
                s.setProperty('--ref-h', img.naturalHeight + 'px');
            };
            img.src = 'reference.png';
        })();
    </script>
</head>
<body>
    <div class="comparison-container">
        <div class="comparison-item">
            <div class="label">Reference</div>
            <div class="reference-image">
                <img src="reference.png" alt="Reference" />
            </div>
            <div class="state-label">reference.png</div>
        </div>

        <div class="comparison-item">
            <div class="label">Implementation</div>
            <div class="button-preview">
                <!-- your implementation goes here -->
            </div>
            <div class="state-label">index.html — .button-preview</div>
        </div>
    </div>
</body>
</html>
