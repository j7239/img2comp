<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UI Iteration — Reference vs Implementation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f0f0f0;
            padding: 40px 20px;
        }

        .comparison-container {
            display: flex;
            gap: 40px;
            justify-content: center;
            align-items: flex-start;
            max-width: 1400px;
            margin: 0 auto;
            flex-wrap: wrap;
        }

        .comparison-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .label {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }

        .reference-image {
            width: 400px;
            height: 400px;
            background: #fff;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
        }

        .reference-image img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* iterate.js auto-resizes .button-preview to match reference.png dims
           (622 x 619) before every screenshot. Backdrop color and button
           coords below are expressed in those reference pixels. */
        .button-preview {
            /* Sampled backdrop color from reference corners */
            --backdrop: #f7f7f7;
            /* Glass color tokens sampled via iterate.js sample */
            --glass-base: #e5e8ef;
            --glass-top-highlight: #f5f5ff;
            --glass-left-tint: #f5f9fc;
            --glass-right-tint: #fdf7ff;
            --icon-stroke: #c7c3d2;

            position: relative;
            width: 400px;
            height: 400px;
            background: var(--backdrop);
            overflow: hidden;
        }

        /* Circle at measured center (292, 270) with diameter 285 px.
           top = 270 - 142.5 = 127.5 ; left = 292 - 142.5 = 149.5 */
        .glass-button {
            position: absolute;
            top: 128px;
            left: 150px;
            width: 285px;
            height: 285px;
            border-radius: 50%;
            border: none;
            padding: 0;
            background: var(--glass-base);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--icon-stroke);
            cursor: pointer;
            box-shadow:
                0 18px 32px -6px rgba(0, 0, 0, 0.08),
                0 40px 72px -10px rgba(0, 0, 0, 0.12),
                0 6px 24px rgba(210, 180, 220, 0.35);
        }

        .glass-button svg {
            width: 162px;
            height: 162px;
            transform: translateY(8px);
        }

        .state-label {
            font-size: 12px;
            color: #666;
            margin-top: 8px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="comparison-container">
        <div class="comparison-item">
            <div class="label">Reference</div>
            <div class="reference-image">
                <img src="reference.png" alt="Reference" />
            </div>
            <div class="state-label">reference.png</div>
        </div>

        <div class="comparison-item">
            <div class="label">Implementation</div>
            <div class="button-preview">
                <button class="glass-button" aria-label="Open in new">
                    <!-- Lucide arrow-up-right -->
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M7 7h10v10"/>
                        <path d="M7 17 17 7"/>
                    </svg>
                </button>
            </div>
            <div class="state-label">index.html — .button-preview</div>
        </div>
    </div>
</body>
</html>
