<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UI Iteration — Reference vs Implementation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f0f0f0;
            padding: 40px 20px;
        }

        .comparison-container {
            display: flex;
            gap: 40px;
            justify-content: center;
            align-items: flex-start;
            max-width: 1400px;
            margin: 0 auto;
            flex-wrap: wrap;
        }

        .comparison-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .label {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }

        .reference-image {
            width: 400px;
            height: 400px;
            background: #fff;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
        }

        .reference-image img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* iterate.js auto-resizes .button-preview to match reference.png dims
           before every screenshot — the CSS dims below only affect the
           side-by-side layout shown in screenshots/default.png. */
        .button-preview {
            width: 400px;
            height: 400px;
            background: #fff;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
        }

        .state-label {
            font-size: 12px;
            color: #666;
            margin-top: 8px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="comparison-container">
        <div class="comparison-item">
            <div class="label">Reference</div>
            <div class="reference-image">
                <img src="reference.png" alt="Reference" />
            </div>
            <div class="state-label">reference.png</div>
        </div>

        <div class="comparison-item">
            <div class="label">Implementation</div>
            <div class="button-preview">
                <button class="glass-button">↗</button>
            </div>
            <div class="state-label">index.html — .button-preview</div>
        </div>
    </div>
</body>
</html>
